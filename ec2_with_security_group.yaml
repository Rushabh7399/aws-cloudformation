AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 with Security Group and Nginx via UserData

Resources:

  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and HTTP
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0   # SSH
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0   # HTTP

  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-098341ffb8b768450   # Amazon Linux (ap-south-1)
      InstanceType: t3.micro
      SecurityGroupIds:
        - !Ref MySecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y nginx
          systemctl start nginx
          systemctl enable nginx
          echo "<h1>Welcome from CloudFormation 🚀</h1>" > /usr/share/nginx/html/index.html

Outputs:

  InstancePublicIP:
    Description: Public IP of EC2
    Value: !GetAtt MyEC2Instance.PublicIp